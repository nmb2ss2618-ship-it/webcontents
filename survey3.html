<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>survey3</title>
    </head>
    <body>
        
        <header>
            <h3><span>설문지</span></h3>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
            <hr>
        </header>

        <section>
            <article>
                <form>
                    <fieldset>
                        <legend></legend>
                        
                        학년
                        <input type="radio" name="grade" value="1"> 1학년
                        <input type="radio" name="grade" value="2"> 2학년
                        <input type="radio" name="grade" value="3"> 3학년<br><br>
                        
                        성별
                        <input type="radio" name="sex" value="1"> 남
                        <input type="radio" name="sex" value="2"> 여<br><br>
                        
                        관심분야
                        <select name="int">
                            <option value="1">AI</option>
                            <option value="2">모바일 소프트웨어</option>
                            <option value="3">빅데이터</option>
                        </select>
                        <br><br>
                        
                        진로
                        개발<input type="checkbox" name="career" value="1">
                        기획<input type="checkbox" name="career" value="2">
                        영업<input type="checkbox" name="career" value="3">
                        창업<input type="checkbox" name="career" value="4">
                        <br><br>
                        
                        남기고 싶은 말
                        <textarea cols="20" rows="5" placeholder="글을 남겨주세요"></textarea>
                        <br><br>
                        
                    </fieldset>
                </form>
            </article>
        </section>

        <footer>
            <hr>
